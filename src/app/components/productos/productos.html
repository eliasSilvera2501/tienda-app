<h1>Productos</h1>

<p>Estos son los nuevos productos: </p>

<ul>
    @for (producto of listaProductos; track producto.id) {
        <li>
            {{producto.nombre}} - ${{producto.precio}} - {{producto.stock | estado:26}}
            <button (click)="seleccionar(producto)">Ver Detalle</button>
        </li>
        
    }
</ul>
