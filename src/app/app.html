<h1> {{title()}} </h1>


<app-productos [listaProductos]="productos" (productoSeleccionado)="recibirProducto($event)"/>

@if (MiProductoSeleccionado !=null) {
  <div>
    <h3>Producto seleccionado:</h3>
    <p>Nombre: {{MiProductoSeleccionado.nombre}}</p>
    <p>Precio: {{MiProductoSeleccionado.precio}}</p>
    <p>Stock: {{MiProductoSeleccionado.stock}}</p>
  </div>
}

<router-outlet />
